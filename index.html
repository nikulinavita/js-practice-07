<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Практическая работа №7 — События в JS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==== ПРИВЕТСТВЕННЫЙ БАННЕР (PRO: закрыть через { once: true }) ==== -->
  <div id="welcome-banner" class="welcome-banner">
    <p>👋 Добро пожаловать! Это практическая работа по событиям в JS. Удачи!</p>
    <button id="close-banner-btn">✕ Закрыть</button>
  </div>

  <!-- ==== ШАПКА ==== -->
  <header>
    <h1>Практическая работа №7: События в JS</h1>
    <p class="subtitle">Обработчики событий, всплытие и погружение, делегирование</p>
  </header>

  <main>

    <!-- ==== СЕКЦИЯ 1: ФОРМА ДОБАВЛЕНИЯ ЗАДАЧИ ==== -->
    <section class="card" id="form-section">
      <h2>Задание 1 — Добавить задачу</h2>

      <div class="form-group">
        <label for="task-input">Текст задачи:</label>
        <input
          type="text"
          id="task-input"
          placeholder="Минимум 3 символа..."
          maxlength="80"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="priority-select">Приоритет:</label>
        <select id="priority-select">
          <option value="low">🟢 Низкий</option>
          <option value="medium" selected>🟡 Средний</option>
          <option value="high">🔴 Высокий</option>
        </select>
      </div>

      <div class="buttons">
        <button id="add-task-btn">＋ Добавить задачу</button>
      </div>

      <!-- JS выводит сюда сообщение об ошибке валидации -->
      <p id="validation-msg" class="validation-msg" aria-live="polite"></p>
    </section>

    <!-- ==== СЕКЦИЯ 2: УПРАВЛЕНИЕ ==== -->
    <section class="card" id="controls-section">
      <h2>Управление доской</h2>

      <div class="controls-row">
        <div class="buttons">
          <button id="toggle-theme-btn">🌙 Переключить тему</button>
          <button id="clear-done-btn" class="btn-secondary">🗑 Очистить «Готово»</button>
          <!-- PRO: кнопка режима просмотра -->
          <button id="view-mode-btn" class="btn-secondary">👁 Режим просмотра</button>
        </div>
        <p class="counter-line">
          Задач на доске: <span id="task-count">0</span>
        </p>
      </div>
    </section>

    <!-- ==== СЕКЦИЯ 3: KANBAN-ДОСКА ==== -->
    <section id="board-section">
      <div id="board">

        <!-- КОЛОНКА 1: К выполнению -->
        <div class="column" data-status="todo">
          <h2 class="column-title">
            📋 К выполнению
            <span class="column-count">0</span>
          </h2>
          <!-- JS добавляет карточки сюда -->
          <div class="task-list" id="todo-list"></div>
        </div>

        <!-- КОЛОНКА 2: В работе -->
        <div class="column" data-status="in-progress">
          <h2 class="column-title">
            ⚙️ В работе
            <span class="column-count">0</span>
          </h2>
          <div class="task-list" id="in-progress-list"></div>
        </div>

        <!-- КОЛОНКА 3: Готово -->
        <div class="column" data-status="done">
          <h2 class="column-title">
            ✅ Готово
            <span class="column-count">0</span>
          </h2>
          <div class="task-list" id="done-list"></div>
        </div>

      </div>
    </section>

  

  </main>

  <script src="script.js"></script>
</body>
</html>
